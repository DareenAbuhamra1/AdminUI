<div class="verify-container">
  <h2>Verify OTP</h2>
  <p>Please enter the OTP code sent to your phone ({{ phone }}).</p>
  <form (ngSubmit)="verifyOtp()">
    <div class="form-group">
      <label for="otp">OTP Code</label>
      <input id="otp" name="otp" type="text" [(ngModel)]="inputOtp" required placeholder="Enter OTP" />
    </div>
    <button type="submit">Verify</button>
  </form>
</div>
