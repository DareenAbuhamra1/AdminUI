<div class="register-container">
  <h2>Driver Registration</h2>
  <p *ngIf="!registrationSuccess">Please complete your profile to register as a driver.</p>

  <div class="form-grid" *ngIf="!registrationSuccess">
    <div class="form-group">
      <label>First Name *</label>
      <input type="text" [(ngModel)]="registerData.firstName" placeholder="First Name" />
    </div>
    <div class="form-group">
      <label>Last Name *</label>
      <input type="text" [(ngModel)]="registerData.lastName" placeholder="Last Name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="registerData.email" placeholder="Email Address" />
    </div>
    <div class="form-group">
      <label>Gender *</label>
      <select [(ngModel)]="registerData.gender">
        <option [ngValue]=0>Undefined</option>
        <option [ngValue]=1>Male</option>
        <option [ngValue]=2>Female</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" [(ngModel)]="registerData.dateOfBirth" />
    </div>
    <div class="form-group">
      <label>Vehicle License *</label>
      <input type="text" [(ngModel)]="registerData.vehicleLicense" placeholder="Vehicle License Plate" />
    </div>
    <div class="form-group">
      <label>Driver License *</label>
      <input type="text" [(ngModel)]="registerData.driverLicense" placeholder="Driver License Number" />
    </div>

    <button class="primary-btn" (click)="registerDriver()" [disabled]="isLoading">
      {{ isLoading ? 'Registering...' : 'Register' }}
    </button>
  </div>
</div>
