<mat-sidenav-container class="dashboard-container">
  <!-- The Side Menu -->
  <mat-sidenav mode="side" [opened]="isSidebarOpen" class="admin-sidenav">
    <app-admin-menu></app-admin-menu>
  </mat-sidenav>

  <!-- The Main Dashboard Body -->
  <mat-sidenav-content class="dashboard-content">
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="toggleSidebar()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Admin Dashboard</span>
    </mat-toolbar>
    
    <div class="content-area">
      <!-- Your inner dashboard statistics/widgets or router-outlet for child routes -->
      <h2>Welcome to the Admin Dashboard!</h2>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
