<mat-nav-list>
  <div mat-subheader>Admin Menu</div>
  <a mat-list-item *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="active-link">
    <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
    <div matListItemTitle>{{ item.label }}</div>
  </a>
</mat-nav-list>
<mat-nav-list style="margin-top: auto;">
  <a mat-list-item (click)="logout()" style="cursor: pointer; color: #dc3545;">
    <mat-icon matListItemIcon>logout</mat-icon>
    <div matListItemTitle>Logout</div>
  </a>
</mat-nav-list>
